<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plug Me | Manage Stations (Super Admin)</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00535b",
                        "surface-container": "#edeeef",
                        background: "#f8f9fa",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        tertiary: "#0d5621",
                        "on-surface-variant": "#3e494a",
                        "on-surface": "#191c1d",
                        "surface-container-high": "#e7e8e9",
                        "surface-container-low": "#f3f4f5",
                        error: "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#abf4ac",
                        "on-tertiary-fixed-variant": "#07521d",
                    },
                    fontFamily: {
                        headline: ["Manrope"],
                        body: ["Inter"],
                        label: ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface">

<div class="flex min-h-screen">
    <!-- SideNavBar -->
    <aside id="sidebar" class="h-screen w-64 fixed left-0 top-0 -translate-x-full lg:translate-x-0 transition-transform duration-300 z-[60] bg-slate-100 dark:bg-slate-950 flex flex-col p-4 gap-2 ">
        <div class="mb-8 px-2 flex flex-col">
            <h1 class="text-teal-900 dark:text-teal-100 font-black text-2xl font-headline tracking-tight">Plug Me</h1>
            <span class="text-xs font-semibold tracking-wide uppercase text-slate-500">Energy Management</span>
        </div>
        <nav class="flex-1 space-y-1">
            <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:text-teal-500 hover:translate-x-1 transition-transform duration-200">
                <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                <span class="text-sm font-label tracking-wide uppercase font-semibold">Dashboard</span>
            </a>
            <a href="manage-admins.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:text-teal-500 hover:translate-x-1 transition-transform duration-200">
                <span class="material-symbols-outlined" data-icon="group">group</span>
                <span class="text-sm font-label tracking-wide uppercase font-semibold">Manage Admins</span>
            </a>
            <a href="manage-stations.html" class="flex items-center gap-3 px-3 py-2.5 text-teal-700 dark:text-teal-300 bg-white dark:bg-slate-900 rounded-lg shadow-sm font-bold transition-transform duration-200">
                <span class="material-symbols-outlined" data-icon="ev_station">ev_station</span>
                <span class="text-sm font-label tracking-wide uppercase font-semibold">Charging Stations</span>
            </a>
            <a href="reports.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:text-teal-500 hover:translate-x-1 transition-transform duration-200">
                <span class="material-symbols-outlined" data-icon="assessment">assessment</span>
                <span class="text-sm font-label tracking-wide uppercase font-semibold">Reports</span>
            </a>
            <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:text-teal-500 hover:translate-x-1 transition-transform duration-200">
                <span class="material-symbols-outlined" data-icon="settings">settings</span>
                <span class="text-sm font-label tracking-wide uppercase font-semibold">Settings</span>
            </a>
        </nav>
        <div class="mt-auto pt-4 space-y-1">
            <a data-action="logout" class="flex items-center gap-3 px-3 py-2.5 text-error hover:bg-error/5 rounded-lg transition-colors cursor-pointer">
                <span class="material-symbols-outlined" data-icon="logout">logout</span>
                <span class="text-sm font-semibold tracking-wide uppercase">Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="lg:ml-64 flex-1">
        <header class="w-full sticky top-0 z-40 bg-slate-50/70 backdrop-blur-xl flex justify-between items-center px-8 py-4 shadow-[0px_24px_48px_rgba(0,83,91,0.06)]">
            <div class="flex items-center gap-4">
                <button id="mobile-menu-btn" class="lg:hidden text-slate-600 hover:text-primary transition-colors flex items-center justify-center mr-2">
                    <span class="material-symbols-outlined text-3xl">menu</span>
                </button>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                    <input type="text" id="searchInput" placeholder="Search stations..." class="pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-full text-sm w-48 sm:w-80 focus:ring-2 focus:ring-primary/20">
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-sm font-bold text-teal-800">Super Admin</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary">admin_panel_settings</span>
                </div>
            </div>
        </header>

        <div class="p-8 max-w-7xl mx-auto space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-headline font-bold text-primary">Charging Stations</h2>
                <button onclick="openModal()" class="bg-primary text-white px-6 py-2 rounded-full font-bold shadow-lg hover:shadow-xl transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined">add</span>
                    Add Station
                </button>
            </div>

            <!-- Stations Table -->
            <div class="bg-surface-container-lowest rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[800px]">
                        <thead>
                            <tr class="bg-surface-container-low/50 text-on-surface-variant border-b border-slate-200">
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Station Details</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Assigned Admin</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-center">Status</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="stationsTableBody" class="divide-y divide-slate-100">
                            <!-- Rendered via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Add/Edit Station Modal -->
<div id="stationModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-lg w-full relative">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-error transition-colors">
            <span class="material-symbols-outlined">close</span>
        </button>
        <h3 id="modalTitle" class="text-2xl font-bold font-headline text-primary mb-6">Add New Station</h3>
        
        <form id="stationForm" class="space-y-4">
            <input type="hidden" id="stationId">
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Station Name</label>
                <input type="text" id="stationName" required class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Location</label>
                <input type="text" id="stationLocation" required class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Charger Type</label>
                    <select id="chargerType" required class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent">
                        <option value="AC Type 2">AC Type 2</option>
                        <option value="DC Fast (CCS2)">DC Fast (CCS2)</option>
                        <option value="DC Fast (CHAdeMO)">DC Fast (CHAdeMO)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Number of Ports</label>
                    <input type="number" id="stationPorts" required min="1" class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Contact Number</label>
                <input type="text" id="stationContact" required class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Assign Admin (Owner)</label>
                <select id="stationAdmin" required class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent">
                    <option value="">Select an Admin...</option>
                    <!-- Rendered via JS -->
                </select>
            </div>

            <div class="pt-4 flex gap-4">
                <button type="button" onclick="closeModal()" class="flex-1 py-3 text-slate-500 font-bold hover:bg-slate-100 rounded-xl transition-colors">Cancel</button>
                <button type="submit" class="flex-1 py-3 bg-primary text-white font-bold rounded-xl shadow-lg hover:shadow-xl hover:bg-primary-container transition-all">Save Station</button>
            </div>
        </form>
    </div>
</div>

<script src="../assets/js/auth.js"></script>
<script src="../assets/js/stations.js"></script>
<script>
    // Security
    const currentUser = Auth.requireRole('superadmin');
    if (!currentUser) throw new Error('Access denied');

    // Logout
    document.querySelectorAll('[data-action="logout"]').forEach(el => {
        el.onclick = e => { e.preventDefault(); Auth.logout(); };
    });

    // Load Admins for dropdown
    function loadAdminsDropdown() {
        const admins = JSON.parse(localStorage.getItem('plugme_admins_list')) || [];
        const select = document.getElementById('stationAdmin');
        select.innerHTML = '<option value="">Select an Admin...</option>';
        
        admins.filter(a => a.role === 'admin' && a.status === 'approved').forEach(admin => {
            select.innerHTML += `<option value="${admin.id}">${admin.name} (${admin.email})</option>`;
        });
    }

    // Render Table
    function renderStations(searchQuery = '') {
        const tbody = document.getElementById('stationsTableBody');
        const stations = StationsDB.getStations();
        const admins = JSON.parse(localStorage.getItem('plugme_admins_list')) || [];

        tbody.innerHTML = '';

        const filtered = stations.filter(s => 
            s.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
            s.location.toLowerCase().includes(searchQuery.toLowerCase())
        );

        if(filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-slate-500">No stations found.</td></tr>`;
            return;
        }

        filtered.forEach(station => {
            const admin = admins.find(a => a.id === station.adminId) || { name: 'Unassigned Admin' };
            const isActive = station.status === 'active';
            
            const statusBadge = isActive 
                ? `<span class="px-3 py-1 bg-tertiary-fixed text-on-tertiary-fixed-variant text-[10px] font-bold rounded-full uppercase">Active</span>`
                : `<span class="px-3 py-1 bg-surface-container-high text-on-surface-variant text-[10px] font-bold rounded-full uppercase">Inactive</span>`;

            tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-colors group">
                    <td class="px-6 py-4">
                        <p class="font-bold text-primary">${station.name}</p>
                        <p class="text-xs text-on-surface-variant">${station.location} • ${station.chargerType} (${station.ports} ports)</p>
                        <p class="text-[10px] text-slate-400 mt-1">ID: ${station.id}</p>
                    </td>
                    <td class="px-6 py-4">
                        <p class="text-sm font-medium">${admin.name}</p>
                    </td>
                    <td class="px-6 py-4 text-center">
                        ${statusBadge}
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="toggleStationStatus('${station.id}')" title="Toggle Status" class="p-2 text-slate-400 hover:text-primary transition-colors">
                                <span class="material-symbols-outlined">${isActive ? 'power_settings_new' : 'play_arrow'}</span>
                            </button>
                            <button onclick="openModal('${station.id}')" title="Edit" class="p-2 text-slate-400 hover:text-secondary transition-colors">
                                <span class="material-symbols-outlined">edit</span>
                            </button>
                            <button onclick="deleteStation('${station.id}')" title="Delete" class="p-2 text-slate-400 hover:text-error transition-colors">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    // Modal Actions
    function openModal(stationId = null) {
        document.getElementById('stationModal').classList.remove('hidden');
        document.getElementById('stationForm').reset();
        
        if (stationId) {
            document.getElementById('modalTitle').innerText = 'Edit Station';
            const station = StationsDB.getStation(stationId);
            if (station) {
                document.getElementById('stationId').value = station.id;
                document.getElementById('stationName').value = station.name;
                document.getElementById('stationLocation').value = station.location;
                document.getElementById('chargerType').value = station.chargerType;
                document.getElementById('stationPorts').value = station.ports;
                document.getElementById('stationContact').value = station.contact;
                document.getElementById('stationAdmin').value = station.adminId;
            }
        } else {
            document.getElementById('modalTitle').innerText = 'Add New Station';
            document.getElementById('stationId').value = '';
        }
    }

    function closeModal() {
        document.getElementById('stationModal').classList.add('hidden');
    }

    // Form Submit
    document.getElementById('stationForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const stationData = {
            id: document.getElementById('stationId').value || undefined,
            name: document.getElementById('stationName').value,
            location: document.getElementById('stationLocation').value,
            chargerType: document.getElementById('chargerType').value,
            ports: parseInt(document.getElementById('stationPorts').value),
            contact: document.getElementById('stationContact').value,
            adminId: document.getElementById('stationAdmin').value,
            status: 'active' // default
        };

        // If editing, preserve old status
        if(stationData.id) {
            const oldStation = StationsDB.getStation(stationData.id);
            if(oldStation) stationData.status = oldStation.status;
        }

        StationsDB.saveStation(stationData);
        closeModal();
        renderStations(document.getElementById('searchInput').value);
    });

    // Delete
    function deleteStation(stationId) {
        if (confirm("Are you sure you want to delete this station? This cannot be undone.")) {
            StationsDB.deleteStation(stationId);
            renderStations(document.getElementById('searchInput').value);
        }
    }

    // Toggle
    function toggleStationStatus(stationId) {
        StationsDB.toggleStatus(stationId);
        renderStations(document.getElementById('searchInput').value);
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderStations(e.target.value);
    });

    // Initialize
    loadAdminsDropdown();
    renderStations();
</script>

<!-- Mobile Sidebar Overlay -->
<div id="mobile-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[55] hidden lg:hidden transition-opacity opacity-0"></div>

<script>
    // Mobile Sidebar Toggle Logic
    document.addEventListener('DOMContentLoaded', () => {
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-overlay');

        if(mobileMenuBtn && sidebar && overlay) {
            function toggleSidebar() {
                const isOpen = !sidebar.classList.contains('-translate-x-full');
                if (isOpen) {
                    // Close
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('opacity-0');
                    setTimeout(() => overlay.classList.add('hidden'), 300);
                } else {
                    // Open
                    overlay.classList.remove('hidden');
                    // slight delay to allow display:block to apply before opacity transition
                    setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                    sidebar.classList.remove('-translate-x-full');
                }
            }

            mobileMenuBtn.addEventListener('click', toggleSidebar);
            overlay.addEventListener('click', toggleSidebar);
        }
    });
</script>
</body>
</html>
