<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Onboarding | Plug Me</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00535b",
                        "on-primary": "#ffffff",
                        "surface": "#f8f9fa",
                        "background": "#f8f9fa",
                        "outline": "#6f797a",
                        "primary-container": "#006d77"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background font-body min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
        <div class="bg-primary p-8 text-white text-center">
            <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-md">
                <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">assignment_ind</span>
            </div>
            <h1 class="text-3xl font-headline font-extrabold mb-2">Partner Onboarding</h1>
            <p class="text-white/70 font-body">Tell us more about your charging infrastructure to get started.</p>
        </div>
        
        <form class="p-10 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest" for="company">Company Name</label>
                    <input class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="company" name="company" placeholder="e.g. GreenCharge Solutions" type="text" required/>
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest" for="tax_id">Tax ID / Business Number</label>
                    <input class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="tax_id" name="tax_id" placeholder="e.g. 12-3456789" type="text" required/>
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest" for="stations">Expected Stations</label>
                    <select class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="stations" name="stations" required>
                        <option value="1-5">1 - 5 Stations</option>
                        <option value="6-20">6 - 20 Stations</option>
                        <option value="21-50">21 - 50 Stations</option>
                        <option value="50+">50+ Stations</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest" for="location">Primary Region</label>
                    <input class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="location" name="location" placeholder="e.g. Western Europe" type="text" required/>
                </div>
            </div>
            
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest" for="description">Tell us about your mission</label>
                <textarea class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none transition-all min-h-[120px]" id="description" name="description" placeholder="Briefly describe your business goals..." required></textarea>
            </div>
            
            <div class="flex items-center gap-4 p-4 bg-primary-container/10 rounded-2xl border border-primary-container/20">
                <span class="material-symbols-outlined text-primary-container">info</span>
                <p class="text-sm text-primary-container font-medium">
                    Your request will be reviewed by our Super Admin team within 24-48 hours.
                </p>
            </div>
            
            <button class="w-full py-4 bg-primary text-white font-headline font-bold text-lg rounded-2xl shadow-xl shadow-primary/20 hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                Submit Request
                <span class="material-symbols-outlined">send</span>
            </button>
        </form>
    </div>

    <script type="module" src="../assets/js/auth.js"></script>
<script type="module">
    import { Auth } from '../assets/js/auth.js';
        // ── Security: must be logged in as admin with pending_onboarding ─────
        const user = Auth.refreshSession();

        if (!user) {
            window.location.replace('../auth/login.html');
        } else if (user.role === 'superadmin') {
            window.location.replace('../super-admin/dashboard.html');
        } else if (user.status !== 'pending_onboarding') {
            // Already submitted onboarding → redirect to admin dashboard
            window.location.replace('dashboard.html');
        }

        // Pre-fill name in the header if available
        document.querySelector('h1').textContent = user
            ? `Welcome, ${user.name.split(' ')[0]}!`
            : 'Partner Onboarding';

        // ── Form submit ──────────────────────────────────────────────────────
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();

            const data = {
                company    : document.getElementById('company').value.trim(),
                taxId      : document.getElementById('tax_id').value.trim(),
                stations   : document.getElementById('stations').value,
                location   : document.getElementById('location').value.trim(),
                description: document.getElementById('description').value.trim()
            };

            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">autorenew</span> Submitting…';

            setTimeout(async () => {
                const result = await Auth.updateOnboarding(data);
                if (result.success) {
                    // Redirect to admin dashboard which shows the pending overlay
                    window.location.replace('dashboard.html');
                } else {
                    btn.disabled = false;
                    btn.innerHTML = 'Submit Request <span class="material-symbols-outlined">send</span>';
                    alert('Error submitting request. Please try again.');
                }
            }, 400);
        });
    </script>
</body>
</html>
