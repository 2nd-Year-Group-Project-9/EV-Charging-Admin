<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plug Me | Manage Stations (Super Admin)</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Leaflet Maps API -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00535b",
                        "surface-container": "#edeeef",
                        background: "#f8f9fa",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        tertiary: "#0d5621",
                        "on-surface-variant": "#3e494a",
                        "on-surface": "#191c1d",
                        "surface-container-high": "#e7e8e9",
                        "surface-container-low": "#f3f4f5",
                        error: "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#abf4ac",
                        "on-tertiary-fixed-variant": "#07521d",
                    },
                    fontFamily: {
                        headline: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface">

<div class="flex min-h-screen">
    <!-- SideNavBar -->
    <aside id="sidebar" class="group h-screen w-64 lg:w-20 lg:hover:w-64 fixed left-0 top-0 -translate-x-full lg:translate-x-0 transition-all duration-300 z-[60] bg-slate-100 dark:bg-slate-950 flex flex-col p-4 gap-2 overflow-x-hidden shadow-2xl lg:shadow-none hover:shadow-2xl">
        <div class="mb-8 px-2 flex flex-col overflow-hidden">
            <h1 class="text-teal-900 dark:text-teal-100 font-black text-2xl font-headline tracking-tight whitespace-nowrap opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity duration-300">Plug Me</h1>
            <span class="text-xs font-semibold tracking-wide uppercase text-slate-500 whitespace-nowrap opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity duration-300">Energy Management</span>
        </div>
        <nav class="flex-1 space-y-1">
            <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:text-teal-500 hover:translate-x-1 transition-transform duration-200 whitespace-nowrap">
                <span class="material-symbols-outlined shrink-0" data-icon="dashboard">dashboard</span>
                <span class="text-sm font-label tracking-wide uppercase font-semibold opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity duration-300">Dashboard</span>
            </a>
            <a href="manage-admins.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:text-teal-500 hover:translate-x-1 transition-transform duration-200 whitespace-nowrap">
                <span class="material-symbols-outlined shrink-0" data-icon="group">group</span>
                <span class="text-sm font-label tracking-wide uppercase font-semibold opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity duration-300">Manage Admins</span>
            </a>
            <a href="manage-stations.html" class="flex items-center gap-3 px-3 py-2.5 text-teal-700 dark:text-teal-300 bg-white dark:bg-slate-900 rounded-lg shadow-sm font-bold transition-transform duration-200 whitespace-nowrap">
                <span class="material-symbols-outlined shrink-0" data-icon="ev_station">ev_station</span>
                <span class="text-sm font-label tracking-wide uppercase font-semibold opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity duration-300">Charging Stations</span>
            </a>
            <a href="reports.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:text-teal-500 hover:translate-x-1 transition-transform duration-200 whitespace-nowrap">
                <span class="material-symbols-outlined shrink-0" data-icon="assessment">assessment</span>
                <span class="text-sm font-label tracking-wide uppercase font-semibold opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity duration-300">Reports</span>
            </a>

                <span class="material-symbols-outlined shrink-0" data-icon="settings">settings</span>

            </a>

                <span class="material-symbols-outlined shrink-0" data-icon="logout">logout</span>
                <span class="text-sm font-semibold tracking-wide uppercase opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity duration-300">Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="lg:ml-64 flex-1">
        <header class="w-full sticky top-0 z-40 bg-slate-50/70 backdrop-blur-xl flex flex-wrap justify-between items-center px-4 md:px-8 py-4 shadow-[0px_24px_48px_rgba(0,83,91,0.06)] gap-4">
            <div class="flex items-center gap-2 sm:gap-4">
                <button id="mobile-menu-btn" class="lg:hidden text-slate-600 hover:text-primary transition-colors flex items-center justify-center mr-2">
                    <span class="material-symbols-outlined text-3xl">menu</span>
                </button>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                    <input type="text" id="searchInput" placeholder="Search stations..." class="pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-full text-sm w-48 sm:w-80 focus:ring-2 focus:ring-primary/20">

            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">

                </div>

        <div class="p-8 max-w-7xl mx-auto space-y-6">
            <div class="flex justify-between items-center">

                <button onclick="openModal()" class="bg-primary text-white px-6 py-2 rounded-full font-bold shadow-lg hover:shadow-xl transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined">add</span>
                    Add Station
                </button>
            </div>

            <!-- Stations Table -->
            <div class="bg-surface-container-lowest rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[800px]">
                        <thead>
                            <tr class="bg-surface-container-low/50 text-on-surface-variant border-b border-slate-200">
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Station Details</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Assigned Admin</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-center">Price per kWh</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-center">Status</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="stationsTableBody" class="divide-y divide-slate-100">
                            <!-- Rendered via JS -->
                        </tbody>

                </div>
            </div>

    </main>
</div>

<!-- Add/Edit Station Modal -->
<div id="stationModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-6 sm:p-8 max-w-lg w-full max-h-[90vh] overflow-y-auto relative">
        <button onclick="closeModal()" class="absolute top-4 right-4 sm:top-6 sm:right-6 text-slate-400 hover:text-error transition-colors bg-surface-container-low rounded-full p-1 z-20">
            <span class="material-symbols-outlined">close</span>
        </button>
        <h3 id="modalTitle" class="text-2xl font-bold font-headline text-primary mb-6">Add New Station</h3>
        
        <form id="stationForm" class="space-y-4">
            <input type="hidden" id="stationId">
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Station Name</label>
                <input type="text" id="stationName" required class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Location Address</label>
                <input type="text" id="stationLocation" required class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent" placeholder="Select location on map or type address...">
                <div id="map" class="w-full h-48 rounded-2xl border border-slate-100 mt-2 z-10 shadow-inner overflow-hidden"></div>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Available Ports by Type (Same Location)</label>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <div class="bg-surface-container-low p-3 rounded-2xl border border-slate-100/50">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 truncate">AC Type 2</label>
                        <input type="number" id="portAcType2" min="0" value="0" class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                    <div class="bg-surface-container-low p-3 rounded-2xl border border-slate-100/50">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 truncate">CCS2 (DC)</label>
                        <input type="number" id="portCcs2" min="0" value="0" class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                    <div class="bg-surface-container-low p-3 rounded-2xl border border-slate-100/50">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 truncate">CHAdeMO (DC)</label>
                        <input type="number" id="portChademo" min="0" value="0" class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Contact Number</label>
                <input type="text" id="stationContact" required class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Assign Admin (Owner)</label>
                <select id="stationAdmin" required class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent">
                    <option value="">Select an Admin...</option>
                    <!-- Rendered via JS -->
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Station Status</label>
                <select id="stationStatus" required class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent">
                    <option value="active">Active (Online)</option>
                    <option value="inactive">Inactive (Offline)</option>
                    <option value="maintaining">Maintaining (Under Maintenance)</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Pricing per kWh (LKR)</label>
                <input type="number" id="stationKwhPrice" required min="0" step="0.01" class="w-full px-4 py-2 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-transparent" placeholder="e.g. 80.00">
            </div>

            <div class="pt-4 flex gap-4">
                <button type="button" onclick="closeModal()" class="flex-1 py-3 text-slate-500 font-bold hover:bg-slate-100 rounded-xl transition-colors">Cancel</button>
                <button type="submit" class="flex-1 py-3 bg-primary text-white font-bold rounded-xl shadow-lg hover:shadow-xl hover:bg-primary-container transition-all">Save Station</button>
            </div>
        </form>
    </div>
</div>

<script type="module" src="../assets/js/auth.js"></script>
<script type="module">
    import { Auth } from '../assets/js/auth.js';
    import { StationsDB } from '../assets/js/stations.js';

    // Security
    const currentUser = Auth.requireRole('superadmin');
    if (!currentUser) throw new Error('Access denied');

    // Logout
    document.querySelectorAll('[data-action="logout"]').forEach(el => {
        el.onclick = e => { e.preventDefault(); Auth.logout(); };
    });

    // Load Admins for dropdown
    async function loadAdminsDropdown() {
        const admins = await Auth.getAdminsList();
        const select = document.getElementById('stationAdmin');
        select.innerHTML = '<option value="">Select an Admin...</option>';
        
        admins.filter(a => a.role === 'admin' && a.status === 'approved').forEach(admin => {
            select.innerHTML += `<option value="${admin.id}">${admin.name} (${admin.email})</option>`;
        });
    }

    // Render Table
    async function renderStations(searchQuery = '') {
        const tbody = document.getElementById('stationsTableBody');
        const stations = await StationsDB.getStations();
        const admins = await Auth.getAdminsList();

        tbody.innerHTML = '';

        const filtered = stations.filter(s => 
            s.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
            s.location.toLowerCase().includes(searchQuery.toLowerCase())
        );

        if(filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-slate-500">No stations found.</td></tr>`;
            return;
        }

        filtered.forEach(station => {
            const admin = admins.find(a => a.id === station.adminId) || { name: 'Unassigned Admin' };
            const status = station.status || 'active';
            let statusBadge = '';
            let actionIcon = 'power_settings_new';
            
            if (status === 'active') {
                statusBadge = `<span class="px-3 py-1 bg-tertiary-fixed text-on-tertiary-fixed-variant text-[10px] font-bold rounded-full uppercase">Active</span>`;
                actionIcon = 'build'; // Cycle to maintaining
            } else if (status === 'maintaining') {
                statusBadge = `<span class="px-3 py-1 bg-amber-100 text-amber-800 text-[10px] font-bold rounded-full uppercase">Maintaining</span>`;
                actionIcon = 'play_arrow'; // Cycle to inactive
            } else {
                statusBadge = `<span class="px-3 py-1 bg-surface-container-high text-on-surface-variant text-[10px] font-bold rounded-full uppercase">Inactive</span>`;
                actionIcon = 'power_settings_new'; // Cycle to active
            }

            tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-colors group">
                    <td class="px-6 py-4">
                        <p class="font-bold text-primary">${station.name}</p>
                        <p class="text-xs text-on-surface-variant">${station.location} • ${station.chargerType} (${station.ports} ports)</p>
                        <p class="text-[10px] text-slate-400 mt-1">ID: ${station.id}</p>
                    </td>
                    <td class="px-6 py-4">
                        <p class="text-sm font-medium">${admin.name}</p>
                    </td>
                    <td class="px-6 py-4 text-center font-bold text-slate-700">
                        Rs. ${parseFloat(station.pricePerKwh || 0).toFixed(2)}
                    </td>
                    <td class="px-6 py-4 text-center">
                        ${statusBadge}
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="toggleStationStatus('${station.id}')" title="Change Status" class="p-2 text-slate-400 hover:text-primary transition-colors">
                                <span class="material-symbols-outlined">${actionIcon}</span>
                            </button>
                            <button onclick="openModal('${station.id}')" title="Edit" class="p-2 text-slate-400 hover:text-secondary transition-colors">
                                <span class="material-symbols-outlined">edit</span>
                            </button>
                            <button onclick="deleteStation('${station.id}')" title="Delete" class="p-2 text-slate-400 hover:text-error transition-colors">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    // ── Leaflet Map variables ─────────────────────────────────────────────
    let map = null;
    let marker = null;
    let selectedCoords = null;

    function initMap(lat = 52.5200, lon = 13.4050) {
        if (!map) {
            map = L.map('map').setView([lat, lon], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            marker = L.marker([lat, lon], { draggable: true }).addTo(map);

            map.on('click', async function(e) {
                const coords = e.latlng;
                marker.setLatLng(coords);
                await handleCoordinatesChange(coords.lat, coords.lng);
            });

            marker.on('dragend', async function(e) {
                const coords = marker.getLatLng();
                await handleCoordinatesChange(coords.lat, coords.lng);
            });
        } else {
            map.setView([lat, lon], 13);
            marker.setLatLng([lat, lon]);
        }

        setTimeout(() => {
            map.invalidateSize();
        }, 100);

        selectedCoords = { latitude: lat, longitude: lon };
    }

    async function handleCoordinatesChange(lat, lng) {
        selectedCoords = { latitude: lat, longitude: lng };
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
            const data = await res.json();
            if (data && data.address) {
                const addressParts = [];
                if (data.address.road) addressParts.push(data.address.road);
                if (data.address.suburb) addressParts.push(data.address.suburb);
                if (data.address.city || data.address.town || data.address.village) {
                    addressParts.push(data.address.city || data.address.town || data.address.village);
                }
                if (data.address.country) addressParts.push(data.address.country);

                const shortAddress = addressParts.length > 0 ? addressParts.join(', ') : data.display_name;
                document.getElementById('stationLocation').value = shortAddress;
            }
        } catch (err) {
            console.error('Geocoding Error:', err);
        }
    }

    // Modal Actions
    async function openModal(stationId = null) {
        document.getElementById('stationModal').classList.remove('hidden');
        document.getElementById('stationForm').reset();
        
        if (stationId) {
            document.getElementById('modalTitle').innerText = 'Edit Station';
            const station = await StationsDB.getStation(stationId);
            if (station) {
                document.getElementById('stationId').value = station.id;
                document.getElementById('stationName').value = station.name;
                document.getElementById('stationLocation').value = station.location;
                document.getElementById('stationContact').value = station.contact;
                document.getElementById('stationAdmin').value = station.adminId;
                document.getElementById('stationStatus').value = station.status || 'active';
                document.getElementById('stationKwhPrice').value = station.pricePerKwh || '80.00';

                // Load ports config
                const config = station.portsConfig || {};
                document.getElementById('portAcType2').value = config.ac_type2 || 0;
                document.getElementById('portCcs2').value = config.ccs2 || 0;
                document.getElementById('portChademo').value = config.chademo || 0;

                // Legacy fallback normalization
                if (!station.portsConfig) {
                    if (station.chargerType === 'AC Type 2') {
                        document.getElementById('portAcType2').value = station.ports || 0;
                    } else if (station.chargerType === 'DC Fast (CCS2)') {
                        document.getElementById('portCcs2').value = station.ports || 0;
                    } else if (station.chargerType === 'DC Fast (CHAdeMO)') {
                        document.getElementById('portChademo').value = station.ports || 0;
                    }
                }

                // Initialize map with saved coordinates
                const coords = station.coordinates || { latitude: 52.5200, longitude: 13.4050 };
                initMap(coords.latitude, coords.longitude);
            }
        } else {
            document.getElementById('modalTitle').innerText = 'Add New Station';
            document.getElementById('stationId').value = '';
            document.getElementById('portAcType2').value = 0;
            document.getElementById('portCcs2').value = 0;
            document.getElementById('portChademo').value = 0;
            document.getElementById('stationAdmin').value = '';
            document.getElementById('stationStatus').value = 'active';
            document.getElementById('stationKwhPrice').value = '80.00';
            initMap(52.5200, 13.4050); // Default Berlin
        }
    }

    function closeModal() {
        document.getElementById('stationModal').classList.add('hidden');
    }

    // Form Submit
    document.getElementById('stationForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const ac = parseInt(document.getElementById('portAcType2').value) || 0;
        const ccs = parseInt(document.getElementById('portCcs2').value) || 0;
        const chademo = parseInt(document.getElementById('portChademo').value) || 0;

        const totalPorts = ac + ccs + chademo;
        if (totalPorts === 0) {
            alert('Please specify at least one charger port.');
            return;
        }

        const typesList = [];
        if (ac > 0) typesList.push(`${ac}x AC Type 2`);
        if (ccs > 0) typesList.push(`${ccs}x CCS2 (DC)`);
        if (chademo > 0) typesList.push(`${chademo}x CHAdeMO (DC)`);
        const chargerTypeStr = typesList.join(', ');
        
        const stationData = {
            id: document.getElementById('stationId').value || undefined,
            name: document.getElementById('stationName').value,
            location: document.getElementById('stationLocation').value,
            coordinates: selectedCoords,
            portsConfig: {
                ac_type2: ac,
                ccs2: ccs,
                chademo: chademo
            },
            ports: totalPorts,
            chargerType: chargerTypeStr,
            contact: document.getElementById('stationContact').value,
            adminId: document.getElementById('stationAdmin').value,
            status: document.getElementById('stationStatus').value,
            pricePerKwh: parseFloat(document.getElementById('stationKwhPrice').value) || 0
        };

        const success = await StationsDB.saveStation(stationData);
        if (success) {
            closeModal();
            await renderStations(document.getElementById('searchInput').value);
        } else {
            alert('Failed to save the station details. Please check your network or Firestore rules.');
        }
    });

    // Delete
    async function deleteStation(stationId) {
        if (confirm("Are you sure you want to delete this station? This cannot be undone.")) {
            await StationsDB.deleteStation(stationId);
            await renderStations(document.getElementById('searchInput').value);
        }
    }

    // Toggle
    async function toggleStationStatus(stationId) {
        await StationsDB.toggleStatus(stationId);
        await renderStations(document.getElementById('searchInput').value);
    }

    // Bind to window for inline onclick handlers in type="module"
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.deleteStation = deleteStation;
    window.toggleStationStatus = toggleStationStatus;

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderStations(e.target.value);
    });

    // Initialize
    async function init() {
        await loadAdminsDropdown();
        await renderStations();
    }
    init();
</script>

<!-- Mobile Sidebar Overlay -->
<div id="mobile-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[55] hidden lg:hidden transition-opacity opacity-0"></div>

<script>
    // Mobile Sidebar Toggle Logic
    document.addEventListener('DOMContentLoaded', () => {
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-overlay');

        if(mobileMenuBtn && sidebar && overlay) {
            function toggleSidebar() {
                const isOpen = !sidebar.classList.contains('-translate-x-full');
                if (isOpen) {
                    // Close
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('opacity-0');
                    setTimeout(() => overlay.classList.add('hidden'), 300);
                } else {
                    // Open
                    overlay.classList.remove('hidden');
                    // slight delay to allow display:block to apply before opacity transition
                    setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                    sidebar.classList.remove('-translate-x-full');
                }
            }

            mobileMenuBtn.addEventListener('click', toggleSidebar);
            overlay.addEventListener('click', toggleSidebar);
        }
    });
</script>
</body>
